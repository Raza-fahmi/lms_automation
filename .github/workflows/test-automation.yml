name: LMS Automation Test

on:
  push:
    branches: [ main, develop, ci-cd-setup ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Setiap Senin jam 07:00 WIB
  workflow_dispatch:

jobs:
  test:
    name: Run UI & API Tests
    runs-on: ubuntu-latest
    
    # Tambahkan environment variable untuk Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # === PERBAIKAN 1: Install semua dependencies Chrome di Linux ===
      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fonts-liberation \
            libappindicator3-1 \
            libasound2 \
            libatk-bridge2.0-0 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6

      # === PERBAIKAN 2: Setup Chrome dengan versi spesifik ===
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2
        with:
          chromedriver-version: 'latest'

      # === PERBAIKAN 3: Verifikasi Chrome dan ChromeDriver ===
      - name: Verify Chrome installation
        run: |
          google-chrome --version
          chromedriver --version
          which google-chrome
          which chromedriver

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create config file from secrets
        run: |
          mkdir -p src/test/resources/config
          cat > src/test/resources/config/staging.properties << 'EOF'
          # ===== UI Configuration =====
          baseUrl=${{ secrets.UI_BASE_URL }}
          email=${{ secrets.TEST_USER_EMAIL }}
          password=${{ secrets.TEST_USER_PASSWORD }}
          
          # Employee Test Data
          employee.name=${{ secrets.EMPLOYEE_NAME }}
          employee.id=${{ secrets.EMPLOYEE_ID }}
          employee.email=${{ secrets.EMPLOYEE_EMAIL }}
          employee.phone=${{ secrets.EMPLOYEE_PHONE }}
          employee.program.studi=${{ secrets.EMPLOYEE_PROGRAM_STUDI }}
          employee.role=${{ secrets.EMPLOYEE_ROLE }}
          
          # Employee Edit Data
          employee.edit.name=${{ secrets.EMPLOYEE_EDIT_NAME }}
          employee.edit.email=${{ secrets.EMPLOYEE_EDIT_EMAIL }}
          employee.edit.phone=${{ secrets.EMPLOYEE_EDIT_PHONE }}
          employee.edit.role=${{ secrets.EMPLOYEE_EDIT_ROLE }}
          
          # ===== API Configuration =====
          api.base.url=${{ secrets.API_BASE_URL }}
          api.timeout=${{ secrets.API_TIMEOUT }}
          api.auth.token=${{ secrets.API_AUTH_TOKEN }}
          
          # Test User Credentials
          test.user.email=${{ secrets.TEST_USER_EMAIL }}
          test.user.password=${{ secrets.TEST_USER_PASSWORD }}
          test.user.company.id=${{ secrets.TEST_USER_COMPANY_ID }}
          
          # Employee Division ID
          employee.division.id=${{ secrets.EMPLOYEE_DIVISION_ID }}
          EOF
          
          echo "Config file created successfully"
          cat src/test/resources/config/staging.properties

      # === PERBAIKAN 4: Jalankan UI Tests dengan xvfb-run ===
      - name: Run UI Tests
        id: ui-tests
        run: xvfb-run ./gradlew test --tests ui.lms.* --info --stacktrace
        continue-on-error: true

      - name: Debug UI Failure
        if: steps.ui-tests.outcome == 'failure'
        run: |
          echo "=== UI TESTS FAILED. CHECKING LOGS ==="
          echo "--- Test results XML ---"
          find build/test-results/test -name "*.xml" -exec cat {} \;
          echo "--- Chrome version ---"
          google-chrome --version || echo "Chrome not found"
          echo "--- Display check ---"
          echo "DISPLAY: $DISPLAY"

      - name: Run API Tests
        id: api-tests
        run: ./gradlew test --tests api.tests.* --info --stacktrace
        continue-on-error: true

      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ steps.ui-tests.outcome }}" == "success" ]] && [[ "${{ steps.api-tests.outcome }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "status_emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "status_emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            build/reports/tests/test/
            reports/*.html
            build/test-results/test/*.xml
          retention-days: 30

      - name: Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.status_emoji }} *LMS Automation Test Result*\n\n*Status:* ${{ steps.status.outputs.status }}\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*UI Tests:* ${{ steps.ui-tests.outcome }}\n*API Tests:* ${{ steps.api-tests.outcome }}\n\nView Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
